    ];

    const ctx = document.getElementById('myChart');

    function a(vendas) {
        const totaisPorCategoria = {};

        vendas.forEach((p) => {
            const total = p.preco * p.quantidade;

            if (!totaisPorCategoria[p.categoria]) {
                totaisPorCategoria[p.categoria] = 0;
            }

            totaisPorCategoria[p.categoria] += total;
        });

        const labels = Object.keys(totaisPorCategoria);
        const valores = Object.values(totaisPorCategoria);

        const listaDados = []

        listaDados.push(labels)
        listaDados.push(valores)

        return listaDados
    }

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: a(vendas)[0],
            datasets: [{
                label: 'Valor por Categoria',
                data: a(vendas)[1],
                borderWidth: 1
            }]
        },
        options: {
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    const ctx2 = document.getElementById('myChart2');

        });

        const valores = Object.values(agrupCategoria);

        const listaDados = []

        listaDados.push(labels)
        listaDados.push(valores)

        return listaDados
    }
